# ──────────────────────────────────────────────────────────────────────────────
# wrangler.toml — Cloudflare Workers config for MesSmini backend
# CongMC Dev Team — "Vắt kiệt công nghệ" 🐧☝️
# ──────────────────────────────────────────────────────────────────────────────

name            = "amoon-eclipse"
main            = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Worker settings ──────────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
# Secrets — set bằng `wrangler secret put <TÊN>`, KHÔNG commit vào git!
#
#   JWT_SECRET          — chuỗi random ≥ 32 ký tự, dùng ký JWT HS256
#   DB_ENCRYPTION_KEY   — 64 ký tự hex (32 bytes), AES-256-GCM key cho PII trong D1
#   DB_HMAC_KEY         — 64 ký tự hex (32 bytes), HMAC-SHA256 key cho email search token
#   ALLOWED_ORIGINS     — comma-separated CORS origins (vd: https://amoon.pages.dev,amoon://)
#
# Tạo key ngẫu nhiên:
#   openssl rand -hex 32  →  dùng cho DB_ENCRYPTION_KEY và DB_HMAC_KEY
#   openssl rand -base64 32  →  dùng cho JWT_SECRET

# ─── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "amoon-eclipse-db"
database_id   = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
# Create: wrangler d1 create amoon-eclipse-db
# Migrate: wrangler d1 execute amoon-eclipse-db --file=./schema.sql

# ─── R2 Storage (for file attachments) ───────────────────────────────────────
[[r2_buckets]]
binding     = "STORAGE"
bucket_name = "messmini-attachments"
# Create: wrangler r2 bucket create messmini-attachments
#
# Lifecycle policy (auto-delete after 7 days to stay on Free Tier):
# Set via Cloudflare Dashboard → R2 → messmini-attachments → Settings → Lifecycle rules
# Rule: Expire objects after 7 days (avoids Class A/B operation costs on stale files)

# ─── KV (Rate limiter state) ─────────────────────────────────────────────────
[[kv_namespaces]]
binding    = "RATE_LIMIT_KV"
id         = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
# Create: wrangler kv namespace create RATE_LIMIT_KV

# ─── Durable Objects (WebSocket room orchestration) ───────────────────────────
[[durable_objects.bindings]]
name       = "ROOM"
class_name = "ChatRoom"
# Each ChatRoom DO manages one chat room's live WebSocket connections.
# Free Tier: 100k DO requests/day — more than enough for a mini messenger.

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

# ─── Development ──────────────────────────────────────────────────────────────
[dev]
port            = 8787
local_protocol  = "http"
ip              = "localhost"

# ─── Environment: preview ─────────────────────────────────────────────────────
[env.preview]
name = "messmini-server-preview"
vars = { ENVIRONMENT = "preview" }

[[env.preview.d1_databases]]
binding       = "DB"
database_name = "messmini-db-preview"
database_id   = "REPLACE_WITH_PREVIEW_D1_ID"

[[env.preview.r2_buckets]]
binding     = "STORAGE"
bucket_name = "messmini-attachments-preview"

[[env.preview.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id      = "REPLACE_WITH_PREVIEW_KV_ID"
