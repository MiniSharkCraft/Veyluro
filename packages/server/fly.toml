app = "amoon-eclipse"
primary_region = "sin"  # Singapore — gần VN nhất

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  ENV  = "production"
  DB_PATH = "/data/amoon.db"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume cho SQLite
[[mounts]]
  source      = "amoon_data"
  destination = "/data"

[checks]
  [checks.health]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    path          = "/health"
    port          = 8080
    timeout       = "5s"
    type          = "http"
