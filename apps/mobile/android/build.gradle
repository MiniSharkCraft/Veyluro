// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

gradle.projectsEvaluated {
  def workletsProject = project.findProject(':react-native-worklets')
  def reanimatedProject = project.findProject(':react-native-reanimated')

  if (workletsProject != null && reanimatedProject != null) {
    def releaseWorkletsPrefabTasks = workletsProject.tasks.matching { task ->
      task.name == 'generateJsonModelRelease' ||
        task.name == 'prefabReleaseConfigurePackage' ||
        task.name == 'prefabReleasePackage'
    }

    reanimatedProject.tasks.matching { task ->
      task.name.startsWith('configureCMakeRelWithDebInfo')
    }.configureEach { task ->
      task.dependsOn(releaseWorkletsPrefabTasks)
    }
  }
}
